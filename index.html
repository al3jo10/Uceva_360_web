<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recorrido Virtual 360 - VR Inmersivo</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }
        #scene-name {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        #scene-list {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 100;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
            max-height: 120px;
            overflow-y: auto;
        }
        .scene-btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .scene-btn:hover,
        .scene-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="scene-name">Escena: <span id="current-scene">Cargando...</span></div>
    <div id="scene-list"></div>

    <!-- A-Scene con configuración optimizada para VR y alta resolución -->
    <a-scene 
        renderer="antialias: true; colorManagement: true; highRefreshRate: true;"
        vr-mode-ui="enabled: false"
    >
        <!-- Gestor de activos: Carga todas las imágenes preview -->
        <a-assets id="assets-container">
            <!-- Las imágenes se cargarán dinámicamente aquí -->
        </a-assets>

        <!-- Cielo 360 inicial -->
        <a-sky id="main-sky" src="#scene-0-29" rotation="0 -90 0"></a-sky>

        <!-- Cámara y controles -->
        <a-entity id="rig">
            <!-- Cámara con cursor para PC/Móvil -->
            <a-camera look-controls wasd-controls>
                <a-cursor 
                    raycaster="objects: .hotspot" 
                    color="#FFFFFF"
                    fuse="true"
                    fuse-timeout="2000"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                ></a-cursor>
            </a-camera>

            <!-- Controladores láser para Meta Quest 3 -->
            <a-entity 
                laser-controls="hand: right" 
                raycaster="objects: .hotspot; lineOpacity: 0.5"
            ></a-entity>
            <a-entity 
                laser-controls="hand: left" 
                raycaster="objects: .hotspot; lineOpacity: 0.5"
            ></a-entity>
        </a-entity>

        <!-- Contenedor para hotspots (se genera dinámicamente) -->
        <a-entity id="hotspots-container"></a-entity>

    </a-scene>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="vr-scene.js"></script>
</body>
</html>
