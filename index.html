<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Recorrido Virtual 360 - PANOLENS VR</title>
    
    <!-- PANOLELS library -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/panolens@0.12.8/build/panolens.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        #container {
            width: 100%;
            height: 100%;
        }
        
        #scene-name {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        #scene-list {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 100;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
            max-height: 120px;
            overflow-y: auto;
        }
        
        .scene-btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        .scene-btn:hover {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.1);
        }
        
        .scene-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 0 15px rgba(245, 87, 108, 0.8);
        }
        
        #vr-info {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #00FF00;
            font-size: 12px;
            z-index: 100;
            text-shadow: 0 0 5px rgba(0,0,0,0.9);
            display: none;
        }
        
        #vr-info.active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="scene-name">Escena: <span id="current-scene">Cargando...</span></div>
    <div id="scene-list"></div>
    <div id="vr-info">🥽 VR Activo</div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="panolens-scene.js"></script>
</body>
</html>
